version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
    volumes:
      # Mount the models directory so that the API has access to trained models
      # If you run train.py locally, models will be immediately available in the container
      - ./data_and_model/models:/app/data_and_model/models
      # Mount mlruns if you want the API to be able to fetch MLflow metrics
      - ./mlruns:/app/mlruns
    restart: unless-stopped
  
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped
