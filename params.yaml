base:
  random_state: 42
  project: bank_marketing_mlops

data:
  raw_path:        data_and_model/raw/bank-full.csv 
  cleaned_path:    data_and_model/processed/bank_cleaned.csv
  features_path:   data_and_model/features/bank_features.csv
  processed_dir:   data_and_model/processed
  sep:             ";"
  source_url:      ""            # Set to a direct download URL or leave blank to use DVC pull
  test_size:       0.20
  smote_k_neighbors: 5

serving:
  port: 8000

model:
  n_estimators:   300
  max_depth:      6
  learning_rate:  0.05
  subsample:      0.8
  colsample_bytree: 0.8
  scale_pos_weight: 1         
  eval_metric:    logloss
  early_stopping_rounds: 20
  cv_folds:       5

pyspark:
  app_name: "BankMarketingRetraining"
  executor_memory: "2g"
  driver_memory: "2g"
  processed_path: "data_and_model/processed/pyspark_bank_processed.parquet"
  model_path: "data_and_model/models/pyspark_model"
  
monitoring:
  psi_threshold:  0.2
  drift_method:   wasserstein