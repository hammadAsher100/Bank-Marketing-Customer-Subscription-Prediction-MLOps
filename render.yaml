services:
  # Backend API Service — uses Docker to get Java/PySpark support
  # env: python (native Render) has NO Java, causing [JAVA_GATEWAY_EXITED]
  # env: docker runs Dockerfile.api which installs openjdk-11
  - type: web
    name: bank-marketing-api
    env: docker
    dockerfilePath: ./Dockerfile.api
    plan: free
    healthCheckPath: /health
    healthCheckInterval: 300

  # Frontend Streamlit Service — no Java needed, native Python is fine
  - type: web
    name: bank-marketing-frontend
    env: python
    plan: free
    buildCommand: pip install -r requirements-frontend.txt
    startCommand: streamlit run streamlit_app.py --server.port=8501 --server.address=0.0.0.0
    depends_on: bank-marketing-api
